name: E2E Tests

on:
  workflow_run:
    workflows: ["Publish Branch Image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to probe for service images (defaults to current branch)'
        required: false
        type: string

concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  checks: write

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request')
    uses: DEFRA/trade-imports-animals-workspace/.github/workflows/e2e-tests.yml@main
    with:
      branch: ${{ inputs.branch || github.event.workflow_run.head_branch || github.ref_name }}
    secrets: inherit

  report-status:
    needs: e2e
    if: >
      always() &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Report check run on PR
        uses: DEFRA/trade-imports-animals-workspace/.github/actions/report-e2e-status@main
        with:
          e2e-result: ${{ needs.e2e.result }}
          report-url: ${{ needs.e2e.outputs.report-url }}
